name: ✅ Close as BE_HIT

on:
  workflow_dispatch:
    inputs:
      trade_id:
        description: "Trade ID"
        required: false
        default: "TRADE_20260706_124621_400170_3e420018"
        type: string

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/repair_trade_be_hit.py
        env:
          TRADE_ID: ${{ github.event.inputs.trade_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
