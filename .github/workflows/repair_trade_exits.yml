name: 🛠 Repair Trade Exits

on:
  workflow_dispatch:
    inputs:
      trade_ids:
        description: "Trade IDs to repair, comma-separated. Leave default for the 3 known 2026-06-30 trades."
        required: false
        default: "TRADE_20260630_000052_813919_95677c6b,TRADE_20260630_000541_812389_c469be2f,TRADE_20260630_003542_667024_7e662953"
        type: string
      candle_low:
        description: "Actual candle low from TradingView/platform, e.g. 3943.376"
        required: true
        type: string
      candle_high:
        description: "Optional candle high/rebound. Leave empty to force repair for already closed SL_HIT trades."
        required: false
        default: ""
        type: string

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🛠 Repair selected trade exits
        run: python scripts/repair_20260630_trade_exits.py
        env:
          TRADE_IDS: ${{ github.event.inputs.trade_ids }}
          CANDLE_LOW: ${{ github.event.inputs.candle_low }}
          CANDLE_HIGH: ${{ github.event.inputs.candle_high }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
