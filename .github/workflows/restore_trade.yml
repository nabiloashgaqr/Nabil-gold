name: 🛠 Restore Wrong SL Hit

on:
  workflow_dispatch:
    inputs:
      trade_ids:
        description: "Trade ID(s) to restore. Separate multiple IDs with commas."
        required: true
        type: string
      current_price:
        description: "Optional current XAU/USD spot price to write into the trade, e.g. 4045"
        required: false
        default: ""
        type: string

jobs:
  restore-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🛠 Restore listed trade(s)
        run: |
          python scripts/restore_wrong_sl_hit.py
        env:
          TRADE_IDS: ${{ github.event.inputs.trade_ids }}
          CURRENT_PRICE: ${{ github.event.inputs.current_price }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: ✅ Done
        if: always()
        run: |
          echo "Restore workflow completed at $(date)"
