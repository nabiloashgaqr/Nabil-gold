name: 🔧 Fix Trade Breakeven

on:
  workflow_dispatch:
    inputs:
      trade_id:
        description: "Trade ID to fix (e.g. TRADE_20260706_004128_763880_0d6c2abd)"
        required: true
        type: string

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🔧 Fix trade to breakeven
        run: python scripts/fix_trade_breakeven.py
        env:
          TRADE_ID: ${{ github.event.inputs.trade_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
