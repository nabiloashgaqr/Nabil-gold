name: 📊 Gold Analysis Bot

concurrency:
  group: analyze-${{ github.ref }}
  # IMPORTANT: never cancel a run that is already in progress.
  # This is a signal bot: a run that is mid-analysis may be about to save a
  # trade and send a Telegram signal. cancel-in-progress:true would silently
  # kill it (e.g. when a manual run or a delayed/queued cron starts), which is
  # a classic cause of "signal never arrived on the scheduled run".
  cancel-in-progress: false

on:
  schedule:
    # Signals window: 02:00 → 22:00 Asia/Hebron, Monday-Friday
    # Runs every 10 minutes. Internal session filter enforces exact local time.
    # 02:00 local = 23:00 UTC (previous day)
    # 22:00 local = 19:00 UTC
    - cron: "*/10 23 * * 0,1,2,3,4"      # 23:00 UTC (Sun-Thu) → 02:00 local Mon-Fri
    - cron: "*/10 0-19 * * 1,2,3,4,5"    # 00:00-19:59 UTC (Mon-Fri) → 03:00-22:59 local
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🔎 Validate Production Setup
        run: |
          python scripts/validate_setup.py analyze
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

      - name: 🔍 Run Analysis
        run: |
          python scripts/run_analysis.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

      - name: ✅ Success Log
        if: always()
        run: |
          echo "Analysis completed at $(date)"
