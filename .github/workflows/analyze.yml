name: 📊 Gold Analysis Bot

concurrency:
  group: analyze-${{ github.ref }}
  # IMPORTANT: never cancel a run that is already in progress.
  # This is a signal bot: a run that is mid-analysis may be about to save a
  # trade and send a Telegram signal. cancel-in-progress:true would silently
  # kill it (e.g. when a manual run or a delayed external cron starts).
  cancel-in-progress: false

on:
  # Scheduling is intentionally handled by cron-job.org now.
  # This workflow is triggered externally via workflow_dispatch so analysis can
  # run every 5 minutes without relying on GitHub's best-effort schedule.
  workflow_dispatch:
    inputs:
      send_status:
        description: "Send WAIT / Market Status messages for this manual run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🔎 Validate Production Setup
        run: |
          python scripts/validate_setup.py analyze
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: 🔍 Run Analysis
        run: |
          python scripts/run_analysis.py
        env:
          SEND_STATUS_ON_MANUAL: ${{ github.event.inputs.send_status || 'false' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: ✅ Success Log
        if: always()
        run: |
          echo "Analysis completed at $(date)"
