name: 🤖 Telegram Commands

# Polls Telegram for user commands (/status, /open, /today, ...) and replies.
# GitHub Actions has no always-on server, so we poll on a schedule. The minimum
# cron granularity is 1 minute; replies arrive within ~1-2 minutes.

concurrency:
  group: telegram-commands
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"   # every minute

permissions:
  contents: read

jobs:
  commands:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Handle commands
        run: python scripts/run_telegram_commands.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
