name: 📊 Weekly AI Performance Report

concurrency:
  group: weekly-report-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Weekly report: Saturday 10:00 local time (Asia/Hebron/Asia-Jerusalem).
    # Summer time: 07:00 UTC.
    - cron: "0 7 * * 6"  # Saturday 10:00 local
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🔎 Validate Setup
        run: python scripts/validate_setup.py daily-report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: 📊 Generate Weekly Report
        run: python scripts/run_weekly_report.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: 📤 Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: storage/weekly_report.json
