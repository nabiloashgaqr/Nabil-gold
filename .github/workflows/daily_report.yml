name: 📊 Daily Report & Learning

concurrency:
  group: daily_report-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Daily Report at 23:00 local time (Asia/Hebron/Asia-Jerusalem)
    # Summer time: 20:00 UTC. Monday to Friday only (1-5).
    - cron: "0 20 * * 1-5"  # 23:00 local, Mon-Fri
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🔎 Validate Production Setup
        run: |
          python scripts/validate_setup.py daily-report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # The three steps below run with EOD_QUIET=true so they DON'T each send a
      # separate Telegram message. Instead they update the DB and hand their
      # summary to storage/eod_*.txt; the final step folds everything into ONE
      # consolidated daily message. (Same workspace is shared across steps.)
      - name: 🔄 End-of-Day Trade Update
        run: |
          python scripts/run_trade_updates.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          FORCE_TRADE_UPDATE: "true"
          EOD_QUIET: "true"

      - name: 🧠 Run Learning Update
        run: |
          python scripts/run_learning.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EOD_QUIET: "true"

      - name: 📊 Generate Daily Report + Open Trades Report
        run: |
          python scripts/run_daily_report.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: ✅ Success Log
        if: always()
        run: |
          echo "Daily report completed at $(date)"
