name: 📊 Daily Report & Learning
on:
  schedule:
    - cron: "0 23 * * *"  # 23:00 UTC يومياً
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: 🧠 Run Learning Update
        run: |
          python scripts/run_learning.py
      
      - name: 📊 Generate Daily Report
        run: |
          python scripts/run_daily_report.py
      
      - name: 📈 Update Open Trades Status
        run: |
          python -c "
import asyncio
import sys
from datetime import datetime
sys.path.insert(0, '.')
from utils.helpers import load_config
from services.database import DatabaseService
from services.telegram_bot import TelegramBot

async def update_open_trades():
    config = load_config()
    db = DatabaseService(config)
    telegram = TelegramBot(config)
    
    query = '''
        SELECT id, signal_id, trade_type, entry_price, 
               current_price, sl, tp1, tp2, opened_at
        FROM trades 
        WHERE status IN ('OPEN', 'PARTIAL', 'TP1_HIT')
        ORDER BY opened_at DESC
    '''
    trades = await db.execute_query(query)
    
    if not trades:
        await telegram.send_message('📊 تقرير الصفقات المفتوحة\n\n❌ لا توجد صفقات مفتوحة حالياً')
        return
    
    lines = [
        '━━━━━━━━━━━━━━━━━━━━',
        '📊 تقرير الصفقات المفتوحة',
        f'📅 {datetime.now(timezone.utc).strftime(\"%Y-%m-%d %H:%M\")} UTC',
        f'📈 العدد: {len(trades)}',
        '━━━━━━━━━━━━━━━━━━━━',
        ''
    ]
    
    for t in trades:
        ttype = t.get('trade_type', 'BUY')
        entry = float(t.get('entry_price', 0))
        current = float(t.get('current_price', entry) or entry)
        sl = t.get('sl', 0)
        tp1 = t.get('tp1', 0)
        tp2 = t.get('tp2', 0)
        
        if ttype == 'BUY':
            pnl = current - entry
        else:
            pnl = entry - current
        
        emoji = '🟢' if pnl > 0 else '🔴' if pnl < 0 else '🟡'
        
        lines.append(f'{emoji} {ttype}')
        lines.append(f'├ الدخول: {entry}')
        lines.append(f'├ الحالي: {current} ({pnl:+.2f})')
        if sl: lines.append(f'├ SL: {sl}')
        if tp1: lines.append(f'├ TP1: {tp1}')
        if tp2: lines.append(f'├ TP2: {tp2}')
        lines.append('')
    
    lines.append('━━━━━━━━━━━━━━━━━━━━')
    
    await telegram.send_message('\n'.join(lines))

asyncio.run(update_open_trades())
"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: ✅ Success Log
        if: always()
        run: |
          echo "Daily report completed at $(date)"