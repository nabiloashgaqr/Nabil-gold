name: 📊 Daily Report & Learning

concurrency:
  group: daily_report-${{ github.ref }}
  cancel-in-progress: true

on:
  # Scheduling is handled externally by cron-job.org
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date to regenerate, e.g. 2026-06-29 or yesterday. Leave empty for normal daily report."
        required: false
        default: ""
        type: string

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🔎 Validate Production Setup
        run: |
          python scripts/validate_setup.py daily-report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # The three steps below run with EOD_QUIET=true so they DON'T each send a
      # separate Telegram message. Instead they update the DB and hand their
      # summary to storage/eod_*.txt; the final step folds everything into ONE
      # consolidated daily message. (Same workspace is shared across steps.)
      - name: 🔄 End-of-Day Trade Update
        run: |
          python scripts/run_trade_updates.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          FORCE_TRADE_UPDATE: "true"
          EOD_QUIET: "true"

      - name: 🧠 Run Learning Update
        run: |
          python scripts/run_learning.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EOD_QUIET: "true"

      - name: 📊 Generate Daily Report + Open Trades Report
        run: |
          python scripts/run_daily_report.py
        env:
          REPORT_DATE: ${{ github.event.inputs.report_date }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ✅ Success Log
        if: always()
        run: |
          echo "Daily report completed at $(date)"
