name: 🧪 Groq Model Compare

concurrency:
  group: groq_model_compare-${{ github.ref }}
  cancel-in-progress: true


on:
  workflow_dispatch:
    inputs:
      model_a:
        description: 'Baseline Groq model'
        required: false
        default: 'llama-3.1-8b-instant'
      model_b:
        description: 'Candidate Groq model'
        required: false
        default: 'llama-3.3-70b-versatile'

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🧪 Compare Groq Models
        run: |
          python scripts/compare_groq_models.py \
            --model-a "${{ github.event.inputs.model_a }}" \
            --model-b "${{ github.event.inputs.model_b }}" \
            --send-telegram
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: 📤 Upload Comparison Report
        uses: actions/upload-artifact@v4
        with:
          name: groq-model-comparison
          path: storage/groq_model_comparison.json
