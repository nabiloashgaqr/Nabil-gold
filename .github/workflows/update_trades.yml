name: 🔄 Update Open Trades

concurrency:
  group: update_trades-${{ github.ref }}
  # Do not cancel an in-progress trade update (it may be writing SL/TP/trailing
  # changes to the DB). Let it finish.
  cancel-in-progress: false

on:
  schedule:
    # Update trades during signal window: 02:00 → 22:00 Asia/Hebron (Mon-Fri)
    # 02:00 local = 23:00 UTC previous day
    # 22:00 local = 19:00 UTC
    - cron: "0 23 * * 0,1,2,3,4"      # 23:00 UTC (Sun-Thu)
    - cron: "0 0-19 * * 1,2,3,4,5"    # 00:00-19:59 UTC (Mon-Fri)
  workflow_dispatch:

jobs:
  update-trades:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🔎 Validate Production Setup
        run: |
          python scripts/validate_setup.py update-trades
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

      - name: 🔄 Update Trades
        run: |
          python scripts/run_trade_updates.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

      - name: ✅ Success Log
        if: always()
        run: |
          echo "Trade update completed at $(date)"
