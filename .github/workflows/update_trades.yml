name: 🔄 Update Open Trades

concurrency:
  group: update_trades-${{ github.ref }}
  # Do not cancel an in-progress trade update (it may be writing SL/TP/trailing
  # changes to the DB). Let it finish.
  cancel-in-progress: false

on:
  schedule:
    # Open-trade MANAGEMENT must run around the clock on trading days — gold
    # moves 24/5, so a trade can hit TP1/SL/trailing at any hour, including
    # outside the signal-generation window. Run every 30 minutes, all hours,
    # Sunday 22:00 UTC (Mon 01:00 local) → Friday 21:00 UTC.
    # The script itself manages open trades regardless of session because
    # trade_management.update_outside_trading_hours = true.
    - cron: "*/30 * * * 1,2,3,4,5"     # every 30 min, Mon-Fri (all hours UTC)
    - cron: "*/30 22,23 * * 0"          # Sunday 22:00-23:59 UTC (market open, Mon local)
  workflow_dispatch:

jobs:
  update-trades:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🔎 Validate Production Setup
        run: |
          python scripts/validate_setup.py update-trades
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

      - name: 🔄 Update Trades
        run: |
          python scripts/run_trade_updates.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

      - name: ✅ Success Log
        if: always()
        run: |
          echo "Trade update completed at $(date)"
